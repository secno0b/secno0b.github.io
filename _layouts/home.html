---
layout: default
---

{{ content }}

<div class="fade-up fade-up-3" style="margin-top: 60px;">
  <div class="section-label">Latest writing</div>
  <div class="post-list">
    {% for post in site.posts %}
    <a href="{{ post.url | relative_url }}" class="post-card">
      <div class="date">{{ post.date | date: "%Y.%m.%d" }}</div>
      <h2>{{ post.title }}</h2>
      {% if post.subtitle %}
      <div class="subtitle">{{ post.subtitle }}</div>
      {% endif %}
      {% if post.tags.size > 0 %}
      <div class="tags">
        {% for tag in post.tags %}
        <span class="tag">{{ tag }}</span>
        {% endfor %}
      </div>
      {% endif %}
    </a>
    {% endfor %}
  </div>
</div>
